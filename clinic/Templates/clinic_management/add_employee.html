{% extends 'clinic_management/base.html' %}

{% block content %}
<h2>Add Employee</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="employee_name" class="form-label">Name</label>
        <input type="text" id="employee_name" name="employee_name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="employee_phone_number" class="form-label">Phone</label>
        <input type="text" id="employee_phone_number" name="employee_phone_number" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="employee_address" class="form-label">Address</label>
        <textarea id="employee_address" name="employee_address" class="form-control" required></textarea>
    </div>
    <div class="mb-3">
        <label for="job_title" class="form-label">Job Title</label>
        <input type="text" id="job_title" name="job_title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="pharmacy" class="form-label">Pharmacy</label>
        <select id="pharmacy" name="pharmacy" class="form-select" required>
            {% for pharmacy in pharmacies %}
            <option value="{{ pharmacy.pharmacy_id }}">{{ pharmacy.pharmacy_name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Add Employee</button>
</form>
{% endblock %}
