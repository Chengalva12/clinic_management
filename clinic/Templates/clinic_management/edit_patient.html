{% extends 'clinic_management/base.html' %}

{% block content %}
<h2>Edit Patient</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" name="name" id="name" class="form-control" value="{{ patient.patient_name }}" required>
    </div>
    <div class="mb-3">
        <label for="age" class="form-label">Age</label>
        <input type="number" name="age" id="age" class="form-control" value="{{ patient.Age }}" required>
    </div>
    <div class="mb-3">
        <label for="gender" class="form-label">Gender</label>
        <select name="gender" id="gender" class="form-select" required>
            <option value="Male" {% if patient.Gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if patient.Gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if patient.Gender == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="text" name="phone" id="phone" class="form-control" value="{{ patient.patient_phone_number }}" required>
    </div>
    <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea name="address" id="address" class="form-control" rows="3" required>{{ patient.patient_address }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="/patients/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
