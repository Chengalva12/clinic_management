{% extends 'clinic_management/base.html' %}

{% block content %}
<h2>Delete Employee</h2>
<p>Are you sure you want to delete "{{ employee.employee_name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'list_employees' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
