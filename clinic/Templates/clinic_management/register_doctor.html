{% extends 'clinic_management/base.html' %}

{% block content %}
<style>
    body {
        background-color: #f4f6f9; /* Light background for a clean look */
        font-family: 'Roboto', sans-serif; /* Modern and readable font */
    }

    h2 {
        font-size: 2rem;
        font-weight: bold;
        color: #333;
        text-align: center;
        margin-bottom: 20px;
    }

    .form-container {
        background-color: #ffffff; /* White background for contrast */
        padding: 20px 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
        max-width: 600px;
        margin: auto;
    }

    .form-container .form-label {
        font-size: 1rem;
        font-weight: 500;
        color: #555;
        margin-bottom: 8px;
        display: block;
    }

    .form-container .form-control,
    .form-container .form-select {
        font-size: 1rem;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05); /* Subtle inner shadow */
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-container .form-control:focus,
    .form-container .form-select:focus {
        border-color: #007bff; /* Blue border on focus */
        box-shadow: 0 0 4px rgba(0, 123, 255, 0.25); /* Blue glow on focus */
        outline: none;
    }

    .btn-primary {
        background-color: #007bff;
        color: #fff;
        font-size: 1.2rem;
        font-weight: bold;
        border: none;
        padding: 12px 0;
        border-radius: 8px;
        text-align: center;
        width: 100%;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .btn-primary:hover {
        background-color: #0056b3;
        transform: scale(1.02); /* Slight zoom on hover */
    }

    .btn-primary:active {
        background-color: #003f7f;
        transform: scale(0.98); /* Slight shrink on click */
    }
</style>

<h2>Doctor Registration</h2>
<form method="post" class="form-container">
    {% csrf_token %}
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" name="username" id="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" name="name" id="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="text" name="phone" id="phone" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="specialization" class="form-label">Specialization</label>
        <input type="text" name="specialization" id="specialization" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="license_number" class="form-label">License Number</label>
        <input type="text" name="license_number" id="license_number" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="clinic" class="form-label">Clinic</label>
        <select name="clinic" id="clinic" class="form-select" required>
            {% for clinic in clinics %}
            <option value="{{ clinic.clinic_id }}">{{ clinic.clinic_name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
</form>
{% endblock %}
