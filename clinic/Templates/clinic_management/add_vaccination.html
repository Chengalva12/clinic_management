{% extends 'clinic_management/base.html' %}

{% block content %}
<h2>Add a New Vaccination</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">Vaccination Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
        <label for="dosage" class="form-label">Dosage</label>
        <input type="number" class="form-control" id="dosage" name="dosage" required>
    </div>
    <div class="mb-3">
        <label for="clinic" class="form-label">Clinic</label>
        <select class="form-select" id="clinic" name="clinic" required>
            <option value="">Select a Clinic</option>
            {% for clinic in clinics %}
            <option value="{{ clinic.clinic_id }}">{{ clinic.clinic_name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Add Vaccination</button>
    <a href="/vaccinations/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
