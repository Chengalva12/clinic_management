{% extends 'clinic_management/base.html' %}

{% block content %}
<h2>Add a New Medicine</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
        <label for="dosage" class="form-label">Dosage</label>
        <input type="number" class="form-control" id="dosage" name="dosage" required>
    </div>
    <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input type="number" class="form-control" id="price" name="price" required>
    </div>
    <div class="mb-3">
        <label for="manufacture_date" class="form-label">Manufacture Date</label>
        <input type="date" class="form-control" id="manufacture_date" name="manufacture_date" required>
    </div>
    <div class="mb-3">
        <label for="expiry_date" class="form-label">Expiry Date</label>
        <input type="date" class="form-control" id="expiry_date" name="expiry_date" required>
    </div>
    <button type="submit" class="btn btn-success">Add Medicine</button>
    <a href="/medicines/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
